name: Update download count

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write

jobs:
  update-download-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update repo download count
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ASSET_NAME: latest.zip
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repository = os.environ["REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          asset_name = os.environ["ASSET_NAME"]

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "chibi-chaos-download-count",
          }

          download_count = 0
          found_asset = False
          page = 1

          while True:
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}/releases?per_page=100&page={page}",
                  headers=headers,
              )

              with urllib.request.urlopen(request) as response:
                  releases = json.load(response)

              if not releases:
                  break

              for release in releases:
                  for asset in release.get("assets", []):
                      if asset["name"] == asset_name:
                          found_asset = True
                          download_count += int(asset.get("download_count", 0))

              if len(releases) < 100:
                  break

              page += 1

          if not found_asset:
              raise SystemExit(f"Could not find release asset {asset_name}.")

          with open("repo.json", "r", encoding="utf-8") as repo_file:
              repo = json.load(repo_file)

          if not repo:
              raise SystemExit("repo.json does not contain any plugin entries.")

          repo[0]["DownloadCount"] = int(download_count)

          with open("repo.json", "w", encoding="utf-8", newline="\n") as repo_file:
              json.dump(repo, repo_file, indent=2)
              repo_file.write("\n")
          PY

      - name: Commit updated count
        run: |
          if git diff --quiet -- repo.json; then
            echo "Download count unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git commit -m "Update download count"
          git push
